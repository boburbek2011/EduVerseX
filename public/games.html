// ============================================================
// API CONFIG
// ============================================================
const API_URL = window.location.origin + '/api';

function getToken() {
    return localStorage.getItem('jwt_token');
}

async function saveGameResultToBackend(gameName, score, total) {
    try {
        const token = getToken();
        if (!token) {
            console.warn('⚠️ No token, game result not saved');
            return;
        }
        
        const response = await fetch('/api/users/test-result', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({
                subject: 'game_' + gameName.toLowerCase().replace(/\s/g, '_'),
                correct: score,
                wrong: total - score,
                unanswered: 0,
                total: total,
                passed: score >= total / 2 ? 1 : 0
            })
        });
        
        if (response.ok) {
            console.log('✅ Game result saved:', gameName, score, '/', total);
        } else {
            console.error('❌ Failed to save game result:', response.status);
        }
    } catch (error) {
        console.error('❌ Save game result error:', error);
    }
}

// ============================================================
// O'YIN HOLATI
// ============================================================
let currentGame = null;
let currentQuestionIndex = 0;
let score = 0;
let totalQuestions = 0;
let gameCategory = 'all';
let timerInterval = null;
let timeLeft = 0;
let memoryCards = [];
let flippedCards = [];
let matchedPairs = 0;
let isProcessing = false;

// ============================================================
// FILTER
// ============================================================
function setGameCategory(cat) {
    gameCategory = cat;
    document.querySelectorAll('.game-category-filter button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.cat === cat);
    });
    renderGames();
}

// ============================================================
// O'YINLARNI RENDER QILISH
// ============================================================
function renderGames() {
    const grid = document.getElementById('gamesGrid');
    
    let filtered = gamesData;
    if (gameCategory !== 'all') {
        filtered = filtered.filter(g => g.category === gameCategory);
    }
    
    grid.innerHTML = filtered.map(game => {
        const diffClass = game.difficulty;
        const diffLabel = { easy: 'Oson', medium: 'O\'rta', hard: 'Qiyin', expert: 'Mutaxassis' }[game.difficulty] || 'O\'rta';
        const questionCount = game.questions ? game.questions.length : (game.pairs ? game.pairs.length : 0);
        
        return `
            <div class="game-card" onclick="startGame(${game.id})">
                <span class="game-icon">${game.icon}</span>
                <span class="badge-difficulty ${diffClass}">${diffLabel}</span>
                <div class="game-title">${game.title}</div>
                <div class="game-desc">${game.desc}</div>
                <div class="game-stats">
                    <span>❓ <strong>${questionCount}</strong> savol</span>
                    <span>🏷️ ${game.category === 'quiz' ? 'Viktorina' : game.category === 'memory' ? 'Xotira' : game.category === 'puzzle' ? 'Jumboq' : 'Vaqtli'}</span>
                </div>
                <button class="play-btn" onclick="event.stopPropagation(); startGame(${game.id})">▶️ O\'ynash</button>
            </div>
        `;
    }).join('');
}

// ============================================================
// O'YINNI BOSHLASH
// ============================================================
function startGame(gameId) {
    const game = gamesData.find(g => g.id === gameId);
    if (!game) return;
    
    currentGame = game;
    currentQuestionIndex = 0;
    score = 0;
    totalQuestions = game.questions ? game.questions.length : (game.pairs ? game.pairs.length : 0);
    flippedCards = [];
    matchedPairs = 0;
    isProcessing = false;
    
    document.getElementById('gameModalIcon').textContent = game.icon;
    document.getElementById('gameModalTitle').textContent = game.title;
    document.getElementById('gameModalDesc').textContent = game.desc;
    document.getElementById('gameModal').classList.add('active');
    
    if (game.type === 'memory') {
        startMemoryGame();
    } else {
        showQuestion();
    }
}

// ============================================================
// XOTIRA O'YINI
// ============================================================
function startMemoryGame() {
    const area = document.getElementById('gamePlayArea');
    const pairs = currentGame.pairs;
    
    // Kartalarni yaratish
    memoryCards = [];
    pairs.forEach((pair, idx) => {
        memoryCards.push({ id: idx * 2, pairId: idx, content: pair.a, matched: false, flipped: false });
        memoryCards.push({ id: idx * 2 + 1, pairId: idx, content: pair.b, matched: false, flipped: false });
    });
    
    // Tasodifiy aralashtirish
    for (let i = memoryCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [memoryCards[i], memoryCards[j]] = [memoryCards[j], memoryCards[i]];
    }
    
    area.innerHTML = `
        <div class="score-display">🧠 Xotira o'yini - ${pairs.length} juftlik toping!</div>
        <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
            <div>✅ Topilgan: <span id="memoryScore">0</span>/${pairs.length}</div>
            <div>⏱️ <span id="memoryTimer">${currentGame.timeLimit || 60}</span>s</div>
            <div>🔀 Harakatlar: <span id="memoryMoves">0</span></div>
        </div>
        <div class="memory-grid" id="memoryGrid"></div>
        <div id="memoryMessage" style="margin-top:12px;color:#888;"></div>
    `;
    
    const grid = document.getElementById('memoryGrid');
    let moves = 0;
    const totalPairs = memoryCards.length / 2;
    let matched = 0;
    
    // Kartalarni render qilish
    memoryCards.forEach((card, index) => {
        const div = document.createElement('div');
        div.className = 'memory-card';
        div.dataset.index = index;
        div.innerHTML = `<div class="card-back">❓</div>`;
        div.onclick = () => flipCard(index);
        grid.appendChild(div);
    });
    
    // Timer
    timeLeft = currentGame.timeLimit || 60;
    const timerEl = document.getElementById('memoryTimer');
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        if (timerEl) {
            timerEl.textContent = timeLeft;
            if (timeLeft <= 10) timerEl.className = 'timer-display warning';
        }
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            document.querySelectorAll('.memory-card').forEach(el => el.style.pointerEvents = 'none');
            document.getElementById('memoryMessage').innerHTML = `
                <div class="game-result lose">⏰ Vaqt tugadi! ${matched}/${totalPairs} juftlik topildi</div>
                <button class="restart-btn" onclick="startGame(${currentGame.id})">🔄 Qayta o'ynash</button>
                <button class="next-btn" onclick="closeGame()">✕ Yopish</button>
            `;
            saveGameResultToBackend(currentGame.title, matched, totalPairs);
        }
    }, 1000);
    
    // Kartani ochish funksiyasi
    window.flipCard = function(index) {
        if (isProcessing) return;
        const card = memoryCards[index];
        if (card.flipped || card.matched) return;
        
        card.flipped = true;
        const el = document.querySelector(`.memory-card[data-index="${index}"]`);
        el.classList.add('flipped');
        el.innerHTML = `<div class="card-content">${card.content}</div>`;
        
        flippedCards.push(index);
        moves++;
        document.getElementById('memoryMoves').textContent = moves;
        
        if (flippedCards.length === 2) {
            isProcessing = true;
            const idx1 = flippedCards[0];
            const idx2 = flippedCards[1];
            const card1 = memoryCards[idx1];
            const card2 = memoryCards[idx2];
            
            if (card1.pairId === card2.pairId && idx1 !== idx2) {
                // To'g'ri juftlik
                card1.matched = true;
                card2.matched = true;
                matched++;
                document.getElementById('memoryScore').textContent = matched;
                
                document.querySelector(`.memory-card[data-index="${idx1}"]`).classList.add('matched');
                document.querySelector(`.memory-card[data-index="${idx2}"]`).classList.add('matched');
                
                flippedCards = [];
                isProcessing = false;
                
                if (matched === totalPairs) {
                    clearInterval(timerInterval);
                    document.getElementById('memoryMessage').innerHTML = `
                        <div class="game-result win">🎉 Tabriklaymiz! Barcha ${totalPairs} juftlikni topdingiz!</div>
                        <button class="restart-btn" onclick="startGame(${currentGame.id})">🔄 Qayta o'ynash</button>
                        <button class="next-btn" onclick="closeGame()">✕ Yopish</button>
                    `;
                    saveGameResultToBackend(currentGame.title, matched, totalPairs);
                }
            } else {
                // Noto'g'ri
                setTimeout(() => {
                    card1.flipped = false;
                    card2.flipped = false;
                    document.querySelector(`.memory-card[data-index="${idx1}"]`).classList.remove('flipped');
                    document.querySelector(`.memory-card[data-index="${idx2}"]`).classList.remove('flipped');
                    document.querySelector(`.memory-card[data-index="${idx1}"]`).innerHTML = `<div class="card-back">❓</div>`;
                    document.querySelector(`.memory-card[data-index="${idx2}"]`).innerHTML = `<div class="card-back">❓</div>`;
                    flippedCards = [];
                    isProcessing = false;
                }, 800);
            }
        }
    };
}

// ============================================================
// SAVOL KO'RSATISH (VIKTORINA)
// ============================================================
function showQuestion() {
    const area = document.getElementById('gamePlayArea');
    if (!currentGame || !currentGame.questions) return;
    
    if (currentQuestionIndex >= currentGame.questions.length) {
        finishQuiz();
        return;
    }
    
    const q = currentGame.questions[currentQuestionIndex];
    const total = currentGame.questions.length;
    
    // Timer
    timeLeft = currentGame.timeLimit || 15;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        const timerEl = document.getElementById('quizTimer');
        if (timerEl) {
            timerEl.textContent = timeLeft;
            if (timeLeft <= 5) timerEl.className = 'timer-display warning';
        }
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            // Vaqt tugadi - keyingi savol
            answerQuestion(-1);
        }
    }, 1000);
    
    area.innerHTML = `
        <div class="score-display">
            ❓ ${currentQuestionIndex + 1}/${total} · ⭐ ${score} ball
            <span style="margin-left:20px;color:#f39c12;">⏱️ <span id="quizTimer" class="timer-display">${timeLeft}</span>s</span>
        </div>
        <div class="question-text">${q.q}</div>
        <div class="options-grid" id="optionsGrid">
            ${q.options.map((opt, idx) => `
                <button onclick="answerQuestion(${idx})">${String.fromCharCode(65 + idx)}) ${opt}</button>
            `).join('')}
        </div>
        <div class="hint-text">💡 To'g'ri javobni tanlang</div>
    `;
}

// ============================================================
// JAVOB BERISH
// ============================================================
function answerQuestion(selected) {
    if (timerInterval) clearInterval(timerInterval);
    
    const q = currentGame.questions[currentQuestionIndex];
    const buttons = document.querySelectorAll('#optionsGrid button');
    
    buttons.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === q.correct) btn.classList.add('correct');
        if (idx === selected && selected !== q.correct) btn.classList.add('wrong');
    });
    
    if (selected === q.correct) {
        score++;
        showNotification('✅ To\'g\'ri!', 'success');
    } else if (selected !== -1) {
        showNotification('❌ Noto\'g\'ri!', 'error');
    } else {
        showNotification('⏰ Vaqt tugadi!', 'error');
    }
    
    setTimeout(() => {
        currentQuestionIndex++;
        showQuestion();
    }, 1500);
}

// ============================================================
// VIKTORINANI YAKUNLASH
// ============================================================
function finishQuiz() {
    const area = document.getElementById('gamePlayArea');
    const total = currentGame.questions.length;
    const percentage = Math.round((score / total) * 100);
    const passed = percentage >= 60;
    
    area.innerHTML = `
        <div class="score-display">🎯 ${score}/${total} to'g'ri (${percentage}%)</div>
        <div class="game-result ${passed ? 'win' : 'lose'}">
            ${passed ? '🎉 Tabriklaymiz! Siz yutdingiz!' : '😅 Qaytadan urinib ko\'ring!'}
        </div>
        <div style="font-size:14px;color:#888;margin-top:8px;">
            ${passed ? 'Siz bu fanni yaxshi bilasiz!' : 'Ko\'proq mashq qiling!'}
        </div>
        <button class="restart-btn" onclick="startGame(${currentGame.id})">🔄 Qayta o\'ynash</button>
        <button class="next-btn" onclick="closeGame()">✕ Yopish</button>
    `;
    
    saveGameResultToBackend(currentGame.title, score, total);
}

// ============================================================
// O'YINNI YOPISH
// ============================================================
function closeGame() {
    if (timerInterval) clearInterval(timerInterval);
    document.getElementById('gameModal').classList.remove('active');
    currentGame = null;
    currentQuestionIndex = 0;
    score = 0;
    flippedCards = [];
    matchedPairs = 0;
    isProcessing = false;
}

// ============================================================
// NOTIFICATION
// ============================================================
function showNotification(message, type) {
    const existing = document.querySelector('.game-notification');
    if (existing) existing.remove();

    const notification = document.createElement('div');
    notification.className = 'game-notification';
    notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 12px 20px;
        background: rgba(10, 10, 10, 0.95);
        border: 2px solid ${type === 'error' ? '#e74c3c' : '#2ecc71'};
        border-radius: 10px;
        color: ${type === 'error' ? '#e74c3c' : '#2ecc71'};
        font-weight: bold;
        z-index: 9999;
        transform: translateX(400px);
        transition: transform 0.3s ease;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        font-size:14px;
    `;
    notification.textContent = message;

    document.body.appendChild(notification);

    setTimeout(() => {
        notification.style.transform = 'translateX(0)';
    }, 10);

    setTimeout(() => {
        notification.style.transform = 'translateX(400px)';
        setTimeout(() => notification.remove(), 300);
    }, 2000);
}

// ============================================================
// BOSHLANG'ICH RENDER
// ============================================================
renderGames();

// Modalni tashqariga bosib yopish
document.getElementById('gameModal').addEventListener('click', function(e) {
    if (e.target === this) closeGame();
});

console.log('✅ Games.js yuklandi! Jami o\'yinlar:', gamesData.length);
